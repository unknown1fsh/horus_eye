# ─── Sunucu ──────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ─── Veritabanı ──────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/horus_eye}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Loglama ─────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.scinar.horuseye=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Flyway ──────────────────────────────────────────────
# Baseline an existing pre-Flyway schema at V1 so we don't try to
# re-run create-table statements that already executed manually.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# ─── Redis (feed snapshot cache) ─────────────────────────
# Optional: when REDIS_HOST is unset, FeedCacheService falls back to a no-op.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s
app.cache.feed-ttl-seconds=${FEED_CACHE_TTL:60}

# ─── External API ────────────────────────────────────────
app.external-api.rest-countries.url=https://restcountries.com/v3.1
app.external-api.timeout-seconds=30

# ─── CORS ────────────────────────────────────────────────
app.cors.allowed-origin=${ALLOWED_ORIGIN:http://localhost:4200}

# ─── Swagger / OpenAPI ───────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ─── Actuator ────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# Redis is optional in dev — don't fail overall health if it's unreachable.
management.health.redis.enabled=false
